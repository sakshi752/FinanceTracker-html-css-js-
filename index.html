<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://kit.fontawesome.com/5d20fefed5.js" crossorigin="anonymous"></script>
</head>

<body>
    <section class="mainContainer">
        <section class="formContainer">
            <div class="addBtnContainer">
                <button class="toggle">Add Transaction</button>
            </div>
            <div class="formContent">
                <div class="innerFormBox">
                    <div class="formSecOne">
                        <h2 class="formTitle">Add Transaction</h2>
                        <span class="toggle"><i class="fa-solid fa-x"></i></span>
                    </div>
                    <form action="" class="form">
                        <div>
                            <!-- title -->
                            <label for="transactionTitle">Title</label>
                            <input type="text" name="transactionTitle" class="transactionTitle" id="transactionTitle">
                        </div>
                        <div>
                            <!-- amount -->
                            <label for="transactionAmount">Amount</label>
                            <input type="number" name="transactionAmount" class="transactionAmount"
                                id="transactionAmount">
                        </div>
                        <div>
                            <label for="transactionCategory">Label</label>
                            <select name="transactionCategory" class="transactionCatefory" id="transactionCategory">
                                <option value="">Select Category</option>
                                <option value="0">Income</option>
                                <option value="1">Expense</option>

                            </select>
                        </div>
                        <div>
                            <!-- date -->
                            <label for="transactionDate">Date</label>
                            <input type="date" name="transactionDate" class="transactionDate" id="transactionDate">
                        </div>
                        <button class="AddTransactionBtn" id="AddTransactionBtn" type="submit">Add</button>
                    </form>
                </div>

            </div>
        </section>
        <section class="controlContainer">
            <span class="sortTransaction" id="sortTransaction"><i class="fa-solid fa-arrow-down-short-wide"></i></span>
            <span class="filterTransaction" id="filterTransaction"><i class="fa-solid fa-filter"></i></span>
        </section>
        <div class="badgesContainer">
            <p class="totalRevenue" id="totalRevenue">Current Balance : <span class="totalRevenueAmt" id="totalRevenueAmt"></span></p>
            <div class="Expense-Income">
                <p class="income" id="income">Income : <span class="totalIncomeAmt" id="totalIncomeAmt"></span></p>
                <p class="expense" id="expense">Expenses : <span class="totalExpenseAmt" id="totalExpenseAmt"></span></p>
            </div>
        </div>
        <section class="transactionContainer">
        </section>
    </section>
    <script src="script.js"></script>
</body>

</html>
